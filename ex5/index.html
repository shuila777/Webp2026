<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Button Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <p>Click the button to make a BUTTON element with text.</p>
    
    <button onclick="addfunction()" class="btn btn-outline-primary">Add it</button>
    <button onclick="delfunction()" class="btn btn-outline-primary">Del it</button>

    <div id="button-container" class="mt-3"></div>

    <script src="script.js"></script>
</body>
</html>
