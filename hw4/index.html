<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>景點觀光展覽資訊 - HW4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f8f9fa; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-weight: bold; margin: 0; }
        th { background-color: #00a67d !important; color: white; }
        .pagination-info { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        #searchInput { width: 300px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>景點觀光展覽資訊</h1>
        <input type="text" id="searchInput" class="form-control" placeholder="搜尋名稱..." onchange="handleSearch()">
    </div>

    <table id="csie" class="table table-striped table-hover shadow-sm">
        <thead>
            <tr>
                <th style="width: 50%">名稱</th>
                <th style="width: 50%">地點</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="pagination-info">
        <button class="btn btn-outline-secondary" onclick="changePage(-1)" id="prevBtn">上一頁</button>
        <span id="pageText">1 / 1 頁</span>
        <button class="btn btn-outline-secondary" onclick="changePage(1)" id="nextBtn">下一頁</button>
    </div>

    <script>
        // 1. 全域變數定義
        var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
        var allData = [];      // 原始所有資料
        var filteredData = []; // 搜尋後的資料
        var currentPage = 1;   // 目前頁數
        const pageSize = 10;   // 每頁十筆資料

        // 2. Ajax 抓取資料
        var xhr = new XMLHttpRequest();
        xhr.open('GET', openUrl, true);
        xhr.send();

        xhr.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                allData = JSON.parse(this.responseText);
                filteredData = allData; // 預設顯示全部
                renderTable();          // 渲染畫面
            }
        };

        /**
         * 渲染表格內容
         */
        function renderTable() {
            var myTableBody = document.getElementById("csie").getElementsByTagName('tbody')[0];
            myTableBody.innerHTML = ""; // 先清空舊資料

            // 計算分頁資訊
            var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            
            // 取得目前頁面要顯示的資料區間 (例如第一頁 0~10)
            var start = (currentPage - 1) * pageSize;
            var end = start + pageSize;
            var currentBatch = filteredData.slice(start, end);

            // 遍歷當前分頁資料並顯示
            currentBatch.forEach(function(data) {
                var row = myTableBody.insertRow(-1);
                row.insertCell(0).innerHTML = data['title'];
                // 處理部分資料可能沒有地點資訊的情況
                var location = (data['showInfo'] && data['showInfo'][0]) ? data['showInfo'][0]['location'] : "無地點資訊";
                row.insertCell(1).innerHTML = location;
            });

            // 更新頁碼顯示
            document.getElementById("pageText").innerHTML = currentPage + " / " + totalPages + " 頁";
            
            // 控制按鈕啟閉
            document.getElementById("prevBtn").disabled = (currentPage === 1);
            document.getElementById("nextBtn").disabled = (currentPage === totalPages);
        }

        /**
         * 搜尋功能 (Onchange 事件觸發)
         */
        function handleSearch() {
            var keyword = document.getElementById("searchInput").value.toLowerCase();
            
            // 根據關鍵字篩選名稱 (title)
            filteredData = allData.filter(function(item) {
                return item.title.toLowerCase().indexOf(keyword) > -1;
            });

            currentPage = 1; // 搜尋後重置回第一頁
            renderTable();   // 重新渲染
        }

        /**
         * 切換分頁
         */
        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }
    </script>
</body>
</html>
