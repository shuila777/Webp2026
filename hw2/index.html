<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資工選課表 - 懸浮視窗上移版</title>
    <style>
        /* 原有的表格樣式 (保持不變) */
        table { font-family: Arial, sans-serif; border-collapse: collapse; width: 100%; margin-bottom: 10px; }
        td, th { border: 1px solid #ddd; padding: 6px; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #ddd; }
        th { padding-top: 12px; padding-bottom: 12px; text-align: left; background-color: #04AA6D; color: white; }

        /* 懸浮視窗 (Modal) 樣式 - 背景 */
        .modal {
            display: none; /* 預設隱藏 */
            position: fixed;
            z-index: 1000; /* 確保在最上層 */
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); /* 加深半透明背景 */
            overflow: auto; /* 若內容過長可捲動 */
        }

        /* 懸浮視窗內容主體 - 調整位置與樣式 */
        .modal-content {
            background-color: #fefefe;
            /* === 修改重點：調整這裡來控制垂直位置 === */
            margin: 5% auto; /* 5% 代表距離頂部 5% 的高度，比之前的 10% 或 15% 更靠上 */
            /* ======================================= */
            padding: 20px;
            border-radius: 12px; /* 增加圓角 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); /* 增加陰影，更立體 */
            width: 85%; /* 稍微加寬 */
            max-width: 900px; /* 限制最大寬度 */
            height: 80vh; /* 限制高度為螢幕高度的 80% */
            display: flex; /* 使用 flex 佈局 */
            flex-direction: column; /* 垂直排列 */
            position: relative;
        }

        /* 關閉按鈕 */
        .close {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close:hover, .close:focus {
            color: #d9534f; /* 懸停時變紅色 */
            text-decoration: none;
        }

        /* 視窗內的標題 */
        .modal-header h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #04AA6D;
            padding-bottom: 10px;
        }

        /* 視窗內的容器 */
        .modal-body {
            flex: 1; /* 自動填滿剩餘高度 */
            overflow: hidden; /* 隱藏容器捲動條，讓 iframe 自己捲動 */
        }

        /* iframe 樣式 */
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #eee;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=A2337')">物件導向軟體設計</a></td>
                <td>黃崇源</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=61602')">計算機網路實驗</a></td>
                <td>李春良</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=A2338')">作業系統實務</a></td>
                <td>張哲維</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=71796')">生物統計</a></td>
                <td>陳光武</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=A2339')">通訊系統</a></td>
                <td>陳仁暉</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td><a href="javascript:void(0)" onclick="openModal('https://catalog.cgu.edu.tw/coursedata?sectionid=56665')">軟硬體專題(2)</a></td>
                <td>魏志達</td>
            </tr>
        </tbody>
    </table>

    <button onclick="changeResult()" style="margin-top:10px; padding: 5px 10px;">Change</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h3>課程大綱詳情</h3>
            </div>
            <div class="modal-body">
                <iframe id="courseIframe" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        // 圖片要求的原有功能
        function changeResult() {
            var myTable = document.getElementById("csie");
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }

        // 開啟懸浮視窗
        function openModal(url) {
            document.getElementById("courseIframe").src = url;
            document.getElementById("myModal").style.display = "block";
            // 防止背景頁面捲動
            document.body.style.overflow = "hidden";
        }

        // 關閉懸浮視窗
        function closeModal() {
            document.getElementById("myModal").style.display = "none";
            document.getElementById("courseIframe").src = ""; // 清空 src 以節省資源
            // 恢復背景頁面捲動
            document.body.style.overflow = "auto";
        }

        // 點擊視窗外部也可以關閉
        window.onclick = function(event) {
            var modal = document.getElementById("myModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
