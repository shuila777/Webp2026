<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex7 打字機消消樂 - 改進版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #container {
            font-size: 2.5rem;
            min-height: 80px;
            border: 2px solid #333;
            padding: 20px;
            margin-top: 50px;
            word-wrap: break-word;
            outline: none;
            background-color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        .error-hint { color: red; font-weight: bold; }
    </style>
</head>
<body class="container">
    <h2 class="mt-4">打字機消消樂🐔</h2>
    <p>規則：打對首字會消除，打錯<strong>連續三次</strong>會被懲罰（額外加 3 字）！</p>
    
    <div id="container" tabindex="0" class="blockquote text-nowrap"></div>
    <div id="status" class="mt-3">連續打錯次數：<span id="error-num">0</span></div>

    <script src="script.js"></script>
</body>
</html>
